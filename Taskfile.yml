# https://taskfile.dev
#
# Aligned with:
#   - .github/copilot-instructions.md (operational workflows)
#   - .specify/memory/constitution.md  (quality gates, performance standards)
#   - pyproject.toml                   (tool config, dependency groups)

version: '3'

# Task uses sh everywhere; on Windows it bundles Go-based core utilities
# (rm, mkdir, cp, etc.) for compatibility.  pipefail is a POSIX sh option.
set: [pipefail]

vars:
  SRC_DIR: src/fast_fsm
  DOCS_DIR: docs
  DOCS_BUILD: docs/_build/html

tasks:
  # ─────────────────────────────────────────────
  # Testing (Constitution § Quality Gates > Testing)
  # ─────────────────────────────────────────────

  test:
    desc: "Run full test suite — merge gate (62 tests, -x -q)"
    cmds:
      - uv run pytest tests/ -x -q

  test-verbose:
    desc: Run full test suite with verbose output
    cmds:
      - uv run pytest tests/ -v --tb=short

  test-fast:
    desc: Run tests excluding slow/integration markers
    cmds:
      - uv run pytest tests/ -x -q -m "not slow and not integration"

  test-coverage:
    desc: Run tests with HTML coverage report
    cmds:
      - uv run pytest tests/ --cov={{.SRC_DIR}} --cov-report=html --cov-report=term

  # ─────────────────────────────────────────────
  # Code Quality — Two-Phase Gate
  # (Constitution § Quality Gates > Linting & Formatting)
  # ─────────────────────────────────────────────

  fix:
    desc: "Phase 1: Auto-fix formatting and linting (never fails)"
    cmds:
      - uv run ruff format .
      - uv run ruff check --fix .

  check:
    desc: "Phase 2: Validate formatting, linting, and types (blocks merge)"
    cmds:
      - uv run ruff format --check .
      - uv run ruff check .
      - uv run ty check {{.SRC_DIR}}/

  quality:
    desc: "Full quality gate: Phase 1 (auto-fix) → Phase 2 (validate)"
    cmds:
      - task: fix
      - task: check

  # ─────────────────────────────────────────────
  # Type Checking
  # ─────────────────────────────────────────────

  typecheck:
    desc: Type check with ty (primary type checker)
    cmds:
      - uv run ty check {{.SRC_DIR}}/

  typecheck-mypy:
    desc: Type check with mypy (mypyc compatibility verification)
    cmds:
      - uv run mypy {{.SRC_DIR}}/

  # ─────────────────────────────────────────────
  # mypyc Build
  # (Constitution § Architecture > Selective mypyc Compilation)
  # ─────────────────────────────────────────────

  build:
    desc: "Build mypyc-compiled C extension (core.py only)"
    deps: [typecheck]
    cmds:
      - uv run python setup.py build_ext --inplace

  # ─────────────────────────────────────────────
  # Benchmarks (Constitution § Performance Standards)
  # ─────────────────────────────────────────────

  benchmark:
    desc: Run Fast FSM performance benchmark
    cmds:
      - uv run python benchmarks/benchmark_fast_fsm.py

  benchmark-compiled:
    desc: "Benchmark with mypyc build (clean → build → benchmark)"
    cmds:
      - task: clean
      - task: build
      - uv run python benchmarks/benchmark_fast_fsm.py

  benchmark-compare:
    desc: Run comparison benchmarks against other FSM libraries
    cmds:
      - uv run python benchmarks/benchmark.py

  # ─────────────────────────────────────────────
  # Documentation (Copilot-Instructions § Documentation)
  # ─────────────────────────────────────────────

  docs:
    desc: Build Sphinx HTML documentation
    cmds:
      - uv run sphinx-build -b html {{.DOCS_DIR}} {{.DOCS_BUILD}}

  docs-check:
    desc: "Build docs with warnings-as-errors (CI-ready)"
    cmds:
      - uv run sphinx-build -b html {{.DOCS_DIR}} {{.DOCS_BUILD}} -W --keep-going

  docs-test:
    desc: "Test code examples in docs ({testcode}/{testoutput} blocks)"
    cmds:
      - uv run sphinx-build -b doctest {{.DOCS_DIR}} {{.DOCS_DIR}}/_build/doctest

  docs-clean:
    desc: Remove generated documentation
    cmds:
      - uv run python -c "import shutil;shutil.rmtree('docs/_build',ignore_errors=True);print('Cleaned docs/_build.')"

  docs-serve:
    desc: Build and serve docs locally on port 8765
    cmds:
      - task: docs
      - uv run python -m http.server 8765 -d {{.DOCS_BUILD}}

  # ─────────────────────────────────────────────
  # Combined Workflows
  # ─────────────────────────────────────────────

  pre-commit:
    desc: "Pre-commit: auto-fix → validate → fast tests"
    cmds:
      - task: fix
      - task: check
      - task: test-fast

  ci:
    desc: "Full CI pipeline: validate → test → docs"
    cmds:
      - task: check
      - task: test
      - task: docs-check
      - task: docs-test

  # ─────────────────────────────────────────────
  # Maintenance
  # ─────────────────────────────────────────────

  clean:
    desc: Clean build artifacts and caches
    cmds:
      - uv run python -c "import shutil,glob,os;dirs=['build','dist','.pytest_cache','htmlcov','.mypy_cache','.ruff_cache','docs/_build']+glob.glob('*.egg-info');[shutil.rmtree(d,ignore_errors=True) for d in dirs];[os.remove(f) for f in glob.glob('.coverage*') if os.path.isfile(f)];print('Cleaned build artifacts.')"

  # ─────────────────────────────────────────────
  # Default
  # ─────────────────────────────────────────────

  default:
    desc: "Quick check: validate + fast tests"
    cmds:
      - task: check
      - task: test-fast