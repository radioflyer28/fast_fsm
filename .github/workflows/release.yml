name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Build compiled wheels (cibuildwheel) ─────────────────────────────────────
  build_wheels:
    name: Wheels · ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux  — x86_64 (glibc + musl) and aarch64 (glibc only)
          - os: ubuntu-latest
            cibw_archs: "x86_64 aarch64"
            artifact_name: linux

          # Windows — 64-bit only
          - os: windows-latest
            cibw_archs: "AMD64"
            artifact_name: windows

          # macOS — arm64 runner can cross-compile x86_64 and produce universal2
          - os: macos-14
            cibw_archs: "x86_64 arm64 universal2"
            artifact_name: macos

    steps:
      - uses: actions/checkout@v4

      # QEMU lets the x86_64 Linux runner build aarch64 wheels via emulation.
      - name: Set up QEMU (Linux aarch64)
        if: matrix.os == 'ubuntu-latest'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # CPython 3.10–3.13 on all selected arches; skip PyPy
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"

          # Per-platform arch selection driven by the matrix
          CIBW_ARCHS_LINUX: ${{ matrix.cibw_archs }}
          CIBW_ARCHS_WINDOWS: ${{ matrix.cibw_archs }}
          CIBW_ARCHS_MACOS: ${{ matrix.cibw_archs }}

          # Drop musllinux aarch64 — too niche; keep musllinux x86_64
          CIBW_SKIP: "cp*-musllinux_aarch64"

          # Install test dependencies inside each wheel build environment
          CIBW_TEST_REQUIRES: "pytest pytest-asyncio hypothesis"
          # Skip QEMU (Linux aarch64) builds to avoid very slow emulation;
          # skip macOS x86_64 cross-compiled on arm64 runner (no Rosetta in CI)
          CIBW_TEST_SKIP: "cp*-*linux_aarch64 cp*-macosx_x86_64"
          CIBW_TEST_COMMAND: >-
            python -m pytest {project}/tests/test_basic_functionality.py
            {project}/tests/test_async.py -x -q

          # Ensure minimum macOS deployment target for universal support
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=10.15"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.artifact_name }}
          path: ./wheelhouse/*.whl

  # ── Build source distribution (pure-Python fallback) ───────────────────────
  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: uv build --sdist
        env:
          FAST_FSM_PURE_PYTHON: "1"

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Create GitHub Release and attach all artifacts ──────────────────────────
  github_release:
    name: Create GitHub Release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Collect all wheel artifacts into dist/
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      # Add the sdist as well
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ── Optional: Publish to PyPI ───────────────────────────────────────────────
  # Uncomment and add a PYPI_TOKEN repository secret to enable.
  #
  # publish_pypi:
  #   name: Publish to PyPI
  #   needs: [build_wheels, build_sdist]
  #   runs-on: ubuntu-latest
  #   environment:
  #     name: pypi
  #     url: https://pypi.org/project/fast-fsm/
  #   permissions:
  #     id-token: write   # OIDC trusted publishing (no token needed if configured)
  #   steps:
  #     - uses: actions/download-artifact@v4
  #       with:
  #         pattern: wheels-*
  #         merge-multiple: true
  #         path: dist/
  #     - uses: actions/download-artifact@v4
  #       with:
  #         name: sdist
  #         path: dist/
  #     - uses: pypa/gh-action-pypi-publish@release/v1
